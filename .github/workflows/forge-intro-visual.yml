name: Forge Frame Sequence Evidence

on:
  push:
    branches:
      - feature/forge-intro-reveal-v2
    paths:
      - index.html
      - css/forge-intro.css
      - js/forge-intro.js
      - js/forge-frame-sequence.js
      - assets/forge-reveal/**
      - artifacts/forge-frame-audit/**
      - scripts/build-forge-frame-assets.py
      - scripts/apply-forge-frame-integration.py
      - scripts/validate-forge-frame-sequence.mjs
      - scripts/capture-forge-intro.mjs
      - .github/workflows/forge-intro-visual.yml
  pull_request:
    branches: [main]
    paths:
      - index.html
      - css/forge-intro.css
      - js/forge-intro.js
      - js/forge-frame-sequence.js
      - assets/forge-reveal/**
      - artifacts/forge-frame-audit/**
      - scripts/build-forge-frame-assets.py
      - scripts/apply-forge-frame-integration.py
      - scripts/validate-forge-frame-sequence.mjs
      - scripts/capture-forge-intro.mjs
      - .github/workflows/forge-intro-visual.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  visual-evidence:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[forge-evidence]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out PR branch with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install deterministic image tooling
        run: python -m pip install --disable-pip-version-check pillow==12.2.0

      - name: Rebuild and verify audited production assets
        shell: bash
        run: |
          set -euo pipefail
          python scripts/build-forge-frame-assets.py
          git diff --exit-code -- assets/forge-reveal artifacts/forge-frame-audit/performance-report.json

      - name: Verify protected homepage and implementation
        shell: pwsh
        run: |
          ./REFERENCE/scripts/verify_reveal_did_not_modify_baseline.ps1 -Repo $PWD
          ./docs/tbm-3d-handoff/scripts/verify_reveal_did_not_modify_baseline.ps1 -Repo $PWD

      - name: Validate syntax and audited cutoff
        shell: bash
        run: |
          set -euo pipefail
          node --check js/forge-intro.js
          node --check js/forge-frame-sequence.js
          node --check scripts/capture-forge-intro.mjs
          node --check scripts/validate-forge-frame-sequence.mjs
          node scripts/validate-forge-frame-sequence.mjs

      - name: Install Playwright Chromium
        run: |
          npm install --no-save playwright@1.53.2
          npx playwright install --with-deps chromium

      - name: Start HTTP preview
        run: |
          python3 -m http.server 4173 --bind 127.0.0.1 > /tmp/tbm-preview.log 2>&1 &
          echo $! > /tmp/tbm-preview.pid
          for attempt in {1..45}; do
            if curl --fail --silent http://127.0.0.1:4173/index.html > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/tbm-preview.log
          exit 1

      - name: Capture screenshots, reverse motion and diagnostics
        run: node scripts/capture-forge-intro.mjs

      - name: Upload complete review evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: forge-frame-sequence-evidence
          path: |
            artifacts/forge-frame-audit/*
            artifacts/forge-intro/**
          if-no-files-found: warn
          retention-days: 30

      - name: Record evidence run result on the PR branch
        if: ${{ always() && github.event_name == 'push' }}
        shell: bash
        env:
          JOB_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail
          cat > artifacts/forge-frame-audit/workflow-status.json <<EOF
          {
            "status": "${JOB_STATUS}",
            "workflow": "Forge Frame Sequence Evidence",
            "run_id": ${GITHUB_RUN_ID},
            "run_number": ${GITHUB_RUN_NUMBER},
            "tested_commit": "${GITHUB_SHA}",
            "artifact": "forge-frame-sequence-evidence",
            "recorded_at_utc": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add artifacts/forge-frame-audit/workflow-status.json
          git commit -m "[forge-evidence] Record ${JOB_STATUS} Forge evidence run"
          git push origin HEAD:feature/forge-intro-reveal-v2
