name: PR11 sync and frame audit

on:
  push:
    branches:
      - feature/forge-intro-reveal-v2
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pr11-sync-frame-audit
  cancel-in-progress: false

jobs:
  synchronize-and-audit:
    if: ${{ github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[pr11-bot]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out PR branch with history
        uses: actions/checkout@v4
        with:
          ref: feature/forge-intro-reveal-v2
          fetch-depth: 0

      - name: Merge current main into PR11 branch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          if git merge-base --is-ancestor origin/main HEAD; then
            echo "Current main is already contained in the PR branch."
          else
            git merge --no-ff --no-edit origin/main -m "[pr11-bot] Merge current main into PR11 frame-sequence branch"
          fi

      - name: Install image audit dependency
        run: python -m pip install --disable-pip-version-check pillow==11.3.0

      - name: Generate source inventory and contact sheet
        run: python scripts/audit-forge-frames.py

      - name: Commit synchronization and audit evidence
        shell: bash
        run: |
          set -euo pipefail
          git add artifacts/forge-frame-audit/all-48-contact-sheet.jpg \
                  artifacts/forge-frame-audit/source-inventory.json \
                  scripts/audit-forge-frames.py \
                  .github/workflows/pr11-sync-frame-audit.yml
          if ! git diff --cached --quiet; then
            git commit -m "[pr11-bot] Add all-frame audit evidence"
          fi
          git push origin HEAD:feature/forge-intro-reveal-v2

      - name: Assemble inspection bundle
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/pr11-inspection
          cp -R TEVEAL /tmp/pr11-inspection/
          cp -R REFERENCE /tmp/pr11-inspection/
          cp -R docs /tmp/pr11-inspection/
          cp -R skills /tmp/pr11-inspection/
          mkdir -p /tmp/pr11-inspection/css /tmp/pr11-inspection/js /tmp/pr11-inspection/scripts /tmp/pr11-inspection/workflows /tmp/pr11-inspection/artifacts
          cp index.html /tmp/pr11-inspection/
          cp css/forge-intro.css /tmp/pr11-inspection/css/
          cp js/forge-intro.js js/forge-intro-scene.js /tmp/pr11-inspection/js/
          cp scripts/capture-forge-intro.mjs scripts/audit-forge-frames.py /tmp/pr11-inspection/scripts/
          cp .github/workflows/forge-intro-visual.yml .github/workflows/pr11-sync-frame-audit.yml /tmp/pr11-inspection/workflows/
          cp -R artifacts/forge-frame-audit /tmp/pr11-inspection/artifacts/
          git log --oneline --decorate -20 > /tmp/pr11-inspection/git-log.txt
          git diff origin/main...HEAD --stat > /tmp/pr11-inspection/pr11-diff-stat.txt
          git rev-parse HEAD > /tmp/pr11-inspection/head-sha.txt
          git rev-parse origin/main > /tmp/pr11-inspection/main-sha.txt

      - name: Upload full inspection bundle
        uses: actions/upload-artifact@v4
        with:
          name: pr11-frame-audit-source-bundle
          path: /tmp/pr11-inspection
          if-no-files-found: error
          retention-days: 14
