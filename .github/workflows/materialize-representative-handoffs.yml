name: Materialize Representative Handoff Harness

on:
  push:
    branches: [feature/reveal-matched-live-armillary-v2]
    paths:
      - .github/capture-representative-handoffs.b64
      - .github/workflows/materialize-representative-handoffs.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/reveal-matched-live-armillary-v2
          fetch-depth: 0
      - name: Decode, verify and commit representative handoff harness
        shell: bash
        run: |
          set -euo pipefail
          base64 --decode .github/capture-representative-handoffs.b64 | gzip --decompress > scripts/capture-reveal-match-v2.mjs
          echo '0556cbc527d4abe2c7e8f40f9f3230e6f25b29c438884d740b3f3637df678f63  scripts/capture-reveal-match-v2.mjs' | sha256sum --check
          node --check scripts/capture-reveal-match-v2.mjs
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git rm .github/capture-representative-handoffs.b64
          git add scripts/capture-reveal-match-v2.mjs
          git diff --cached --check
          git commit -m 'test: use representative desktop and mobile Forge handoffs'
          git push origin HEAD:feature/reveal-matched-live-armillary-v2

# Existing-workflow update intentionally triggers the one-time materialization run.
