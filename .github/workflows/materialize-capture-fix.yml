name: Materialize Capture Harness Fix

on:
  push:
    branches: [feature/reveal-matched-live-armillary-v2]
    paths:
      - .github/capture-fix.b64
      - .github/workflows/materialize-capture-fix.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/reveal-matched-live-armillary-v2
          fetch-depth: 0
      - name: Decode, verify and commit corrected harness
        shell: bash
        run: |
          set -euo pipefail
          base64 --decode .github/capture-fix.b64 | gzip --decompress > scripts/capture-reveal-match-v2.mjs
          echo 'b2baa3fe7b979fcb46e3f5ccbf324580de7f13a1ddc2426865474c9aa979fa24  scripts/capture-reveal-match-v2.mjs' | sha256sum --check
          node --check scripts/capture-reveal-match-v2.mjs
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git rm .github/capture-fix.b64
          git add scripts/capture-reveal-match-v2.mjs
          git diff --cached --check
          git commit -m 'test: wait for reverse-scroll state propagation'
          git push origin HEAD:feature/reveal-matched-live-armillary-v2
