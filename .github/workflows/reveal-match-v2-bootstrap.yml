name: Materialize Reveal-Matched Armillary V2

on:
  pull_request:
    branches: [main]
    types: [opened, reopened]
    paths:
      - .github/reveal-match-bootstrap/**
      - .github/workflows/reveal-match-v2-bootstrap.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  materialize:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Reassemble the verified supplied package
        shell: bash
        run: |
          set -euo pipefail
          cat \
            .github/reveal-match-bootstrap/payload.01 \
            .github/reveal-match-bootstrap/payload.02 \
            .github/reveal-match-bootstrap/payload.03 \
            .github/reveal-match-bootstrap/payload.04 \
            .github/reveal-match-bootstrap/payload.05 \
            | base64 --decode > /tmp/reveal-match-v2.tgz
          echo 'fe2b258a008c61d21bfea8d1df7f14ae068c4a4caa832b4367aa87b109e25b44  /tmp/reveal-match-v2.tgz' | sha256sum --check
          mkdir -p /tmp/reveal-match-v2
          tar -xzf /tmp/reveal-match-v2.tgz -C /tmp/reveal-match-v2

      - name: Apply the package and the validated visual tuning
        shell: bash
        run: |
          set -euo pipefail
          python /tmp/reveal-match-v2/package/apply_patch.py .
          mkdir -p scripts .github/workflows
          cp /tmp/reveal-match-v2/final/scripts/* scripts/
          cp /tmp/reveal-match-v2/final/.github/workflows/reveal-match-v2-evidence.yml .github/workflows/
          base64 --decode .github/reveal-match-bootstrap/capture-final.b64 \
            | gzip --decompress > scripts/capture-reveal-match-v2.mjs
          git apply --check .github/reveal-match-bootstrap/tuning.patch
          git apply .github/reveal-match-bootstrap/tuning.patch
          echo 'e2510887594dabc4efe9ed83e66653e769acda6a9bdf8da8e0c873678e2560e6  js/hero-3d-reveal-match-v2.js' | sha256sum --check
          echo 'bce758a618932ca708c40169f2c0a8b4b3dd5ffdb969395271e89bd60ec7ab42  scripts/capture-reveal-match-v2.mjs' | sha256sum --check
          rm -rf .tbm-patch-backups

      - name: Verify protected files and implementation structure
        shell: bash
        run: |
          set -euo pipefail
          node --check js/hero-3d-reveal-match-v2.js
          node --check scripts/capture-reveal-match-v2.mjs
          python scripts/verify-reveal-match-v2.py .
          git diff --exit-code 2b56fe29e3e5d4a059c0bbfa025243c77f6b49ce -- \
            js/hero-3d.js \
            css/hero-scroll.css \
            js/home-v2.js \
            css/site-v2.css \
            js/forge-intro.js \
            js/forge-frame-sequence.js \
            css/forge-intro.css \
            assets/forge-reveal \
            TEVEAL
          test "$(find assets/forge-reveal/desktop -maxdepth 1 -name 'frame_*.webp' | wc -l)" -eq 32
          test "$(find assets/forge-reveal/mobile -maxdepth 1 -name 'frame_*.webp' | wc -l)" -eq 32
          git diff --check

      - name: Replace bootstrap history with a reviewable implementation commit
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .github/reveal-match-bootstrap .github/workflows/reveal-match-v2-bootstrap.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --check
          git commit -m 'feat: add reveal-matched live armillary V2'
          git push origin HEAD:${{ github.head_ref || github.ref_name }}
